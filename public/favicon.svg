<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#12161A"/>

  <!-- Bottom slab: right face (shadow), left face (mid), top face (highlight) -->
  <polygon points="60,46 32,56 32,62 60,52" fill="#AA6600"/>
  <polygon points="4,46 32,56 32,62 4,52" fill="#FFB000"/>
  <polygon points="4,46 32,56 60,46 32,36" fill="#FFD060"/>

  <!-- Middle slab -->
  <polygon points="52,30 32,40 32,46 52,36" fill="#AA6600"/>
  <polygon points="12,30 32,40 32,46 12,36" fill="#FFB000"/>
  <polygon points="12,30 32,40 52,30 32,20" fill="#FFD060"/>

  <!-- Top slab -->
  <polygon points="44,14 32,24 32,30 44,20" fill="#AA6600"/>
  <polygon points="20,14 32,24 32,30 20,20" fill="#FFB000"/>
  <polygon points="20,14 32,24 44,14 32,4" fill="#FFD060"/>
</svg>
