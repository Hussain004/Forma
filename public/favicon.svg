<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark base -->
  <rect width="64" height="64" fill="#12161A"/>

  <!-- Outer cube face -->
  <rect x="7" y="7" width="50" height="50" stroke="white" stroke-width="1.5" fill="none"/>

  <!-- Inner cube face (centered) -->
  <rect x="20" y="20" width="24" height="24" stroke="white" stroke-width="1" fill="none"/>

  <!-- Depth lines: each outer corner connects to its inner counterpart -->
  <line x1="7"  y1="7"  x2="20" y2="20" stroke="white" stroke-width="1"/>
  <line x1="57" y1="7"  x2="44" y2="20" stroke="white" stroke-width="1"/>
  <line x1="57" y1="57" x2="44" y2="44" stroke="white" stroke-width="1"/>
  <line x1="7"  y1="57" x2="20" y2="44" stroke="white" stroke-width="1"/>

  <!-- Tactical amber square resting on the top-right internal vertex -->
  <rect x="41" y="17" width="6" height="6" fill="#FFB000"/>
</svg>
