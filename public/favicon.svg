<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#12161A"/>

  <!-- Layer 3 (bottom, widest) drawn first so layers above render on top -->
  <polygon points="2,52 62,52 64,46 4,46" fill="#FFCC55"/>
  <rect x="2" y="52" width="60" height="10" fill="#FFB000"/>

  <!-- Layer 2 (middle) -->
  <polygon points="8,36 56,36 58,30 10,30" fill="#FFCC55"/>
  <rect x="8" y="36" width="48" height="10" fill="#FFB000"/>

  <!-- Layer 1 (top, narrowest) -->
  <polygon points="18,20 46,20 48,14 20,14" fill="#FFCC55"/>
  <rect x="18" y="20" width="28" height="10" fill="#FFB000"/>
</svg>
