<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark base -->
  <rect width="64" height="64" fill="#12161A"/>

  <!-- Input terminal and line -->
  <circle cx="32" cy="3" r="2" fill="rgba(255,255,255,0.55)"/>
  <line x1="32" y1="5" x2="32" y2="13" stroke="white" stroke-width="1"/>

  <!-- Diamond gate (computation node) -->
  <polygon points="32,13 50,31 32,49 14,31" stroke="white" stroke-width="1.5" fill="#16191C"/>

  <!-- Active tensor: amber square at center -->
  <rect x="29" y="28" width="6" height="6" fill="#FFB000"/>

  <!-- Three output branches from bottom vertex -->
  <line x1="32" y1="49" x2="14" y2="61" stroke="white" stroke-width="1"/>
  <line x1="32" y1="49" x2="32" y2="61" stroke="white" stroke-width="1"/>
  <line x1="32" y1="49" x2="50" y2="61" stroke="white" stroke-width="1"/>

  <!-- Output terminals -->
  <circle cx="14" cy="61" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="32" cy="61" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="50" cy="61" r="2" fill="rgba(255,255,255,0.4)"/>
</svg>
